# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI — Training and evaluation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Rendo configurabile manualmente il workflow da interfaccia grafica GITHUB
  # tramite il workflow_dispatch
  workflow_dispatch:
    inputs:
      dataset_name:
        description: "Hugging Face dataset to use"
        required: true
        default: "tweet_eval"
      dataset_config:
        description: "Dataset configuration"
        required: true
        default: "sentiment"
      train_samples:
        description: "Number of traning samples"
        required: true
        default: "1000"
      validation_samples:
        description: "Number of validation samples"
        required: true
        default: "1000"
      num_epochs:
        description: "Number of epochs for training"
        required: true
        default: "1"

permissions:
  contents: read

jobs:
  train-and-test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Test sul funzionamento del codice
    - name: Run unit tests
      run: |
        pytest

    # Step per l'allenamento del modello
    - name: Train model
      env:
        HF_REPO:  ${{ secrets.HF_REPO }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

        DATASET_NAME:   ${{ github.event.inputs.dataset_name   || 'tweet_eval' }}
        DATASET_CONFIG: ${{ github.event.inputs.dataset_config || 'sentiment' }}
        TRAIN_SAMPLES:  ${{ github.event.inputs.train_samples  || '1000' }}
        VALIDATION_SAMPLES:   ${{ github.event.inputs.validation_samples   || '1000' }}
        NUM_EPOCHS: ${{ github.event.inputs.num_epochs   || '3' }}

      run: python src/train.py

    # Step per la valutazione del modello su un bechmark
    - name: Run model evaluation
      env:
        DATASET_NAME:   ${{ github.event.inputs.dataset_name   || 'tweet_eval' }}
        DATASET_CONFIG: ${{ github.event.inputs.dataset_config || 'sentiment' }}
        MODEL_PATH:     "./models/sentiment_model"
        PYTHONPATH:     "."
      run: python src/evaluate.py

    # Creazione di un github artifact per il modello appena addestrato.
    # Necessario affinché il modello addestrato venga poi scaricato dal workflow di deployment
    # Trattandosi di un modello di un certo peso, viene inserito un periodo di retention di 1 giorno, 
    # dopo il quale l'artifact viene automaticamente cancellato, per evitare la sua memorizzazione
    # permanente.
    - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentiment-model
          path: ./models/sentiment_model/
          retention-days: 1