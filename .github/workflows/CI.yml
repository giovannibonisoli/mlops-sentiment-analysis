# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI — Training e test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


  workflow_dispatch:
    inputs:
      dataset_name:
        description: "Dataset HuggingFace da usare"
        required: true
        default: "tweet_eval"
      dataset_config:
        description: "Configurazione del dataset"
        required: true
        default: "sentiment"
      train_samples:
        description: "Numero di esempi per il training"
        required: true
        default: "1000"
      eval_samples:
        description: "Numero di esempi per la validazione"
        required: true
        default: "1000"

permissions:
  contents: read

jobs:
  train-and-test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        pytest

    - name: Train model
      env:
        HF_REPO:  ${{ secrets.HF_REPO }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python src/train.py

    - name: Run model evaluation
      env:
        DATASET_NAME:   ${{ github.event.inputs.dataset_name   || 'tweet_eval' }}
        DATASET_CONFIG: ${{ github.event.inputs.dataset_config || 'sentiment' }}
        MODEL_PATH:     "./models/sentiment_model"
        PYTHONPATH:     "."
      run: python src/evaluate.py
