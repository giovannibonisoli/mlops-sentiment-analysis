name: Monitoring — Sentiment e Drift

on:
  workflow_dispatch:       # Eseguibile anche manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run simulation and monitoring
        env:
          LOG_FILE:             "./monitoring/predictions_log.csv"
          SIMULATE_SAMPLES:     "100"
          MONITORING_HOURS:     "24"
          CONFIDENCE_THRESHOLD: "0.65"
          PYTHONPATH:           "."
        run: python src/monitoring/simulate.py

      - name: Upload predictions log
        uses: actions/upload-artifact@v4
        with:
          name: predictions-log
          path: ./monitoring/predictions_log.csv
          retention-days: 7