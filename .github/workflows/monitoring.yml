# ============================================================
# WORKFLOW DI MONITORAGGIO: SENTIMENT E DATA DRIFT
# ============================================================
# SCOPO: Monitorare continuamente le performance del modello in produzione
# rilevando eventuali degradazioni o cambiamenti nella distribuzione dei dati.
# 
# TRIGGER:
#   1. Schedule: Eseguito automaticamente ogni 8 ore
#   2. Manuale: workflow_dispatch con diverse modalità di simulazione
#
# NOTE: Utile per rilevare concettuali drift o cambiamenti nel sentiment
# degli utenti nel tempo.

name: Monitoring — Sentiment e Drift

on:
  schedule:
    # ===== TRIGGER AUTOMATICO =====
    # Esecuzione schedulata ogni 8 ore (0:00, 8:00, 16:00 UTC)
    # Permette di monitorare il modello in produzione con cadenza regolare
    - cron: "0 */8 * * *"

  # ===== TRIGGER MANUALE =====
  # Permette di testare il sistema di monitoring con diversi scenari:
  # - normal: dati normali (baseline)
  # - drift: cambiamento delle distribuzioni delle classi (discesa della reputazione)
  # - data_drift: cambiamento nelle feature di input (testi)
  workflow_dispatch:
    inputs:
      simulation_mode:
        description: "Simulation mode"
        type: choice
        options:
          - normal        # Scenario normale: distribuzione equilibrata
          - drift         # Concettual drift: cambio nel sentiment prevalente
          - data_drift    # Data drift: cambiamento della distribuzione dei dati
        default: "normal"

permissions:
  contents: write

jobs:
  # ============================================================
  # JOB: MONITORAGGIO COMPLETO
  # ============================================================
  # SCOPO: Simulare richieste al modello, rilevare drift e salvare log
  # OUTPUT: predictions_log.csv (artefatto scaricabile per 7 giorni)
  monitor:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: RECUPERA IL CODICE SORGENTE DALLA REPOSITORY
      # Necessario per avere accesso agli script di monitoring
      - name: Checkout repo
        uses: actions/checkout@v4

      # STEP 2: CONFIGURA L'AMBIENTE PYTHON
      # Versione fissa (3.10) per garantire riproducibilità
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3: INSTALLA LE DIPENDENZE DEL PROGETTO
      # Usa requirements.txt se presente (dovrebbe includere transformers, numpy, ecc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi


      # Step 4: RECUPERA I LOG DELLE PREDIZIONI DELLE RUN PRECEDENTI
      # Le predizioni vengono scaricate dalla repository, che contiene un file di log
      # dove le predizioni vengono accodate.
      # NOTA: In un sistema reale, i log delle predizioni
      # verrebbero persistiti in un database (es. PostgreSQL con TimescaleDB)
      # per recuperare esattamente le finestre temporali desiderate (24-48 ore fa).
      # Il commit sulla repository è una semplificazione didattica.
      - name: Pull latest predictions log from repo
        run: |
          git pull origin main
          mkdir -p ./monitoring/predictions_log


      # STEP 5: SIMULAZIONE RICHIESTE (SOLO DEMO)
      # Genera richieste sintetiche al modello e le registra in predictions_log.csv
      # ATTENZIONE: Questo è SOLO un esempio dimostrativo!
      # 
      # In un progetto reale:
      #   - Si integrerebbe con Twitter/X API, Reddit API, Facebook API, ecc.
      #   - Si estrarrebbero continuamente nuovi testi reali dalle piattaforme social
      #   - Si monitorerebbe il sentiment in tempo reale su dati effettivi degli utenti
      #   - Si userebbe un sistema di streaming (Kafka, RabbitMQ) per gestire il flusso
      #
      # Questa simulazione produce dati fittizi per:
      #   - Testare il workflow di monitoring senza chiamate API reali
      #   - Dimostrare la logica di rilevamento drift
      #   - Permettere esecuzione offline della pipeline
      #
      - name: Run simulation
        env:
          LOG_FILE: "./monitoring/predictions_log/predictions_log.csv"     # Path del file di log
          HF_REPO: ${{ secrets.HF_REPO }}                  # Modello in produzione
          HF_TOKEN: ${{ secrets.HF_TOKEN }}                # Per autenticarsi su HF Hub
          SIMULATE_SAMPLES: "100"                          # Numero di richieste simulate
          PYTHONPATH: "."                                  # Permette import da src/
        run: |
          python src/monitoring/simulate.py ${{ github.event.inputs.simulation_mode || 'normal' }}

      # STEP 6: RILEVAZIONE DRIFT
      # Analizza predictions_log.csv per rilevare:
      # - Conceptual drift: cambiamento nelle distribuzioni delle predizioni
      # - Data drift: cambiamento nelle caratteristiche dei testi
      # - Confidence drift: abbassamento della confidenza media del modello
      - name: Run drift detection
        env:
          LOG_FILE: "./monitoring/predictions_log/predictions_log.csv"
          CONFIDENCE_THRESHOLD: "0.65"
          PYTHONPATH: "."
        run: python src/monitoring/drift.py

      # STEP 7: CARICA PREDIZIONI NUOVE
      # Committa predictions_log.csv sulla repository
      # Utile per analisi offline, debug o audit del modello nel tempo
      # al fine di stabilire la necessità o meno di un riallenamento
      - name: Commit and push updated predictions log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./monitoring/predictions_log/   # ← aggiunge tutta la cartella
          git diff --staged --quiet || git commit -m "Update predictions log [skip ci]"
          git push origin main