name: Monitoring — Sentiment e Drift

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_drift:
        description: "Simulate reputational crisis"
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run simulation
        env:
          LOG_FILE: "./monitoring/predictions_log.csv"
          HF_REPO: ${{ secrets.HF_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SIMULATE_SAMPLES: "100"
          PYTHONPATH: "."
        run: |
          if [ "${{ github.event.inputs.force_drift }}" == "true" ]; then
            python src/monitoring/simulate.py drift
          else
            python src/monitoring/simulate.py
          fi

      - name: Run drift detection
        env:
          LOG_FILE: "./monitoring/predictions_log.csv"
          CONFIDENCE_THRESHOLD: "0.65"
          PYTHONPATH: "."
        run: python src/monitoring/drift.py

      - name: Upload predictions log
        uses: actions/upload-artifact@v4
        with:
          name: predictions-log
          path: ./monitoring/predictions_log.csv
          retention-days: 7