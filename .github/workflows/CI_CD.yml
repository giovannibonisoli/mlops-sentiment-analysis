name: CI — Training, evaluation and deploy

# Definisce quando eseguire la pipeline
on:
  # Trigger automatici: su ogni push o pull request verso il branch main
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Trigger manuale: permette di eseguire un retraining con parametri personalizzati
  # Utile per sperimentare con diverse dimensioni del dataset o numero di epoche
  workflow_dispatch:
    inputs:
      dataset_name:
        description: "Hugging Face dataset to use"
        required: true
        default: "tweet_eval"
      dataset_config:
        description: "Dataset configuration"
        required: true
        default: "sentiment"
      train_samples:
        description: "Number of traning samples"
        required: true
        default: "1000"
      validation_samples:
        description: "Number of validation samples"
        required: true
        default: "1000"
      num_epochs:
        description: "Number of epochs for training"
        required: true
        default: "3"

permissions:
  contents: read # Solo lettura del repository, sufficiente per CI/CD

jobs:
  # ============================================================
  # JOB 1: TEST AUTOMATICI (UNIT E INTEGRATION)
  # ============================================================
  # SCOPO: Verificare che il codice sia funzionalmente corretto
  # TRIGGER: Push e pull_request (automatico)
  # NOTE: Viene eseguito ad ogni push perché è sempre utile valutare
  # la correttezza del codice, forte anche del fatto che è un job veloce.
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    # Installazione delle dipendenze
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    # Linting: controlla errori di sintassi e stile
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Esecuzione di unit test e integration test con pytest
    - name: Run tests
      run: |
        pytest


  # ============================================================
  # JOB 2: TRAINING, VALIDAZIONE E DEPLOY
  # ============================================================
  # SCOPO: Addestrare un nuovo modello e pubblicarlo se è migliore del modello già pubblicaot
  # TRIGGER: Solo manuale (workflow_dispatch) - NON su push/pull_request
  # NOTE: Richiede ~30-60 min e consuma risorse GPU/CPU, motivo per il quale non ha senso lanciarlo ad ogni push
  train-and-deploy:
    runs-on: ubuntu-latest

    # Questa istruzione rende obbligatoria l'esecuzione del JOB 1 (test)
    # Se i test falliscono, l'allenamento non parte. 
    # Ciò permette di prevenire il deploy di codice rotto
    needs: test

    # VINCOLO CRITICO: Questo job parte ESCLUSIVAMENTE su trigger manuale
    # Su push/pull_request viene saltato per risparmiare risorse
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    # ===== STEP 1: ALLENAMENTO =====
    # Addestra il modello usando i parametri specificati manualmente
    # Salva il modello in ./models/sentiment_model
    - name: Train model
      env:
        HF_REPO: ${{ secrets.HF_REPO }} # Repository Hugging Face di destinazione
        DATASET_NAME: ${{ github.event.inputs.dataset_name   || 'tweet_eval' }}
        DATASET_CONFIG: ${{ github.event.inputs.dataset_config || 'sentiment' }}
        TRAIN_SAMPLES: ${{ github.event.inputs.train_samples  || '1000' }}
        VALIDATION_SAMPLES: ${{ github.event.inputs.validation_samples   || '1000' }}
        NUM_EPOCHS: ${{ github.event.inputs.num_epochs   || '3' }}
        PYTHONPATH: ${{ github.workspace }} # Permette import da src/
      run: python src/train.py

    # ===== STEP 2: VALIDAZIONE =====
    # Confronta il nuovo modello con quello in produzione (su HF Hub)
    # Se il nuovo modello non è migliore, lo script fallisce e blocca il deploy
    - name: Evaluate model
      env:
        DATASET_NAME: ${{ github.event.inputs.dataset_name   || 'tweet_eval' }}
        DATASET_CONFIG: ${{ github.event.inputs.dataset_config || 'sentiment' }}
        HF_REPO: ${{ secrets.HF_REPO }}
        EVALUATE_MODE: "validate" # Modalità di confronto con produzione
        PYTHONPATH: ${{ github.workspace }}
      run: python src/evaluate.py

    # ===== STEP 3: DEPLOY =====
    # Pubblica il nuovo modello su Hugging Face Hub
    # Richiede HF_TOKEN con permessi di scrittura (configurato nei GitHub Secrets)
    - name: Push model to HuggingFace Hub
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # Questo step richiede HF_TOKEN con permesso di scrittura
        HF_REPO: ${{ secrets.HF_REPO }}
        MODEL_PATH: "./models/sentiment_model" # Path dove train.py ha salvato il modello
        PYTHONPATH: ${{ github.workspace }}
      run: python src/deploy.py

    